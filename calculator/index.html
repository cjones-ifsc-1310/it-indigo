<html lang="en">
<head>
<title> It Indigo | Chrissy Jones</title>
<meta charset="utf-8"/>
<meta name="author" content="Christine Jones"/>
    <title>JavaScript Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.1/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.1/dist/additional-methods.min.js"></script>
</head>
<body>
    <main>
<form id="myform" onsubmit="return false">
    <div class="formcontainer">
        <h1>Javascript Calculator</h1>
        <fieldset id="detail">
            <legend>Calculator</legend>  
            <br>
            
            <label class="formlabel" for="Operand1">Operand 1: </label>
            <input type="text" id="Operand1" name="Operand1" size="15" maxlength="15"       
                   data-rule-required="true"  data-msg-required="Operand 1 is Required" 
                   data-rule-number="true" data-msg-number="Operand 1 must be a Number">
            <label class="error" for="Operand1" id="Operand1Error"></label>
            <br><br>
      
<label class="formlabel">Operator: </label>

<label>
  <input type="radio" name="Operator" value="Add" required> +
</label>

<label>
  <input type="radio" name="Operator" value="Subtract"> -
</label>

<label>
  <input type="radio" name="Operator" value="Multiply"> *
</label>

<label>
  <input type="radio" name="Operator" value="Divide"> /
</label>

<label for="Operator" class="error" id="OperatorError"></label>
            <br><br>

            <label class="formlabel" for="Operand2">Operand 2: </label>
            <input type="text" id="Operand2" name="Operand2" size="15" maxlength="15"       
                   data-rule-required="true"  data-msg-required="Operand 2 is Required" 
                   data-rule-number="true" data-msg-number="Operand 2 must be a Number">
            <label class="error" for="Operand2" id="Operand2Error"></label>
            <br><br>


            <label class="formlabel">Result: </label>
            <span id="Result"></span>
            <br><br>

            <input type="button" value="Calculate" name="Calculate" onclick="calculate();">
            <input type="button" value="Clear" name="Clear" onclick="clearform();" novalidate>

        </fieldset>
    </div>
</form>
<script src="assets/js/script.js"></script>
</main>
<footer>
  <div id="copyright">
    &copy; 2026 Chrissy Jones <3 </div>
</footer>
 
</body>
</html>
