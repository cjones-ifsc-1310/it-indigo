<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canoe Rental Calculator</title>
<link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

<div class="float-calculator">

  <h2>One Day Canoe Rental Cost</h2>

  <label for="quantity" class="section-label">Number of Canoes</label>
  <select id="quantity">
    <option value="">Select</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
  </select>

  <div class="rate-note">
    $67 per canoe + 9.5% sales tax
  </div>

  <div class="result-box active" id="result">
    <h3>Total Cost</h3>
    <p class="price" id="total">$0.00</p>
  </div>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
