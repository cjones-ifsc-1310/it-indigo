<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canoe Float Chart</title>
<link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<main>
 <div class="float-calculator">
  <div class="river-caption">Downriver Distance from Ponca (in miles)</div>
  <div class="river-timeline" id="river"></div>
  <h2>Plan Your Float</h2>

  <label>Shuttle From</label>
  <div class="static-point">Ponca</div>

  <label>Take-Out Location</label>
  <select id="end">
    <option value="">Select Destination</option>
    <option value="Steel Creek">Steel Creek</option>
    <option value="Kyles">Kyles Landing</option>
    <option value="Pruitt">Pruitt</option>
    <option value="Ozark">Ozark</option>
    <option value="Erbie">Erbie</option>
    <option value="Hasty">Hasty</option>
    <option value="Carver">Hwy 123 (Carver)</option>
  </select>

  <div id="result" class="result-box"></div>
</div>

</main>

<script src="assets/js/script.js"></script>


</body>
